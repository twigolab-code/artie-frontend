<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OG DASH — Game Builder (interno)</title>
    <style>
      @font-face {
        font-family: 'SoccerLeague';
        src: url('/SoccerLeague.ttf') format('truetype');
        font-display: swap;
      }
      :root {
        --bg: #14102e;
        --panel: rgba(10, 8, 24, 0.92);
        --yellow: #ffd23f;
        --blue: #2b54e0;
        --green: #5fd000;
        --red: #e02314;
        --outline: #0a0a12;
        --text: #ffffff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: 'SoccerLeague', system-ui, sans-serif;
      }
      /* Layout: palette a sinistra · canvas al centro · pannello validazione a destra */
      #app {
        display: grid;
        grid-template-columns: 200px 1fr 320px;
        grid-template-rows: 56px 1fr;
        grid-template-areas:
          'topbar topbar topbar'
          'palette canvas validate';
        height: 100vh;
      }
      /* --- Topbar -------------------------------------------------------- */
      #topbar {
        grid-area: topbar;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        background: var(--panel);
        border-bottom: 2px solid var(--outline);
      }
      #topbar .title {
        font-size: 22px;
        color: var(--yellow);
        letter-spacing: 1px;
        margin-right: auto;
      }
      .btn {
        font-family: inherit;
        font-size: 15px;
        color: var(--text);
        background: var(--blue);
        border: 2px solid var(--outline);
        border-radius: 10px;
        padding: 8px 14px;
        cursor: pointer;
        letter-spacing: 0.5px;
      }
      .btn:hover { filter: brightness(1.12); }
      .btn.green { background: var(--green); }
      .btn.ghost { background: rgba(255, 255, 255, 0.08); }
      .btn.small { font-size: 13px; padding: 6px 10px; }
      /* Stato "attivo" del toggle Seleziona (come .swatch.active) */
      .btn.active { background: var(--yellow); color: #000; border-color: var(--outline); }
      /* Controllo zoom: −  100%  + */
      .zoomctl { display: flex; align-items: center; gap: 6px; }
      #zoomPct {
        font-size: 13px; min-width: 46px; text-align: center;
        color: rgba(255, 255, 255, 0.8); font-family: ui-monospace, monospace;
      }
      /* --- Palette ------------------------------------------------------- */
      #palette {
        grid-area: palette;
        background: var(--panel);
        border-right: 2px solid var(--outline);
        overflow-y: auto;
        padding: 12px 10px;
      }
      #palette h2, #validate h2 {
        font-size: 14px;
        color: var(--yellow);
        margin: 4px 2px 10px;
        letter-spacing: 1px;
      }
      .swatch {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 8px 10px;
        margin-bottom: 6px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid transparent;
        border-radius: 10px;
        cursor: pointer;
        text-align: left;
        color: var(--text);
        font-family: inherit;
        font-size: 14px;
      }
      .swatch:hover { background: rgba(255, 255, 255, 0.12); }
      .swatch.active {
        border-color: var(--yellow);
        background: rgba(255, 210, 63, 0.16);
      }
      .swatch .chip {
        flex: 0 0 auto;
        width: 26px;
        height: 26px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        display: grid;
        place-items: center;
        font-size: 12px;
        color: #000;
        font-weight: bold;
      }
      .swatch .lbl { flex: 1; line-height: 1.1; }
      .swatch .code {
        flex: 0 0 auto;
        font-size: 12px;
        opacity: 0.6;
        font-family: ui-monospace, monospace;
      }
      /* --- Canvas -------------------------------------------------------- */
      #canvasWrap {
        grid-area: canvas;
        position: relative;
        overflow: hidden;
        background: #0c0a1f;
      }
      #builder { display: block; width: 100%; height: 100%; touch-action: none; }
      #hud {
        position: absolute;
        left: 10px;
        bottom: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        background: rgba(0, 0, 0, 0.4);
        padding: 5px 9px;
        border-radius: 8px;
        pointer-events: none;
      }
      /* --- Validation pane ---------------------------------------------- */
      #validate {
        grid-area: validate;
        background: var(--panel);
        border-left: 2px solid var(--outline);
        overflow-y: auto;
        padding: 12px;
      }
      #verdict {
        font-size: 18px;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 12px;
        text-align: center;
        letter-spacing: 1px;
      }
      #verdict.ok { background: rgba(95, 208, 0, 0.18); color: var(--green); border: 2px solid var(--green); }
      #verdict.bad { background: rgba(224, 35, 20, 0.16); color: #ff7a6e; border: 2px solid var(--red); }
      #stats { font-size: 13px; line-height: 1.7; margin-bottom: 12px; color: rgba(255,255,255,0.85); }
      #stats b { color: var(--yellow); }
      .check { font-size: 13px; line-height: 1.5; margin: 5px 0; display: flex; gap: 8px; }
      .check .mk { flex: 0 0 auto; }
      .check.ok .mk { color: var(--green); }
      .check.bad .mk { color: #ff7a6e; }
      .legend { margin-top: 16px; font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.7); }
      .legend b { color: var(--yellow); }
      /* --- Modal (export / import) -------------------------------------- */
      #modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 20;
        background: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      #modal.show { display: flex; }
      #modalBox {
        width: min(760px, 92vw);
        max-height: 86vh;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 2px solid var(--yellow);
        border-radius: 14px;
        padding: 16px;
      }
      #modalBox h3 { margin: 0 0 10px; color: var(--yellow); font-size: 18px; }
      #modalBox .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
      #modalBox label { font-size: 13px; }
      #modalBox input[type='text'] {
        font-family: inherit;
        font-size: 15px;
        padding: 7px 10px;
        border-radius: 8px;
        border: 2px solid var(--outline);
        background: #08061a;
        color: var(--text);
      }
      #modalText {
        flex: 1;
        width: 100%;
        min-height: 220px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.4;
        background: #08061a;
        color: #cfe;
        border: 2px solid var(--outline);
        border-radius: 8px;
        padding: 10px;
        resize: vertical;
        white-space: pre;
      }
      #modalHint { font-size: 12px; color: rgba(255,255,255,0.7); margin: 8px 0; line-height: 1.5; }
      #modalHint code { color: var(--yellow); font-family: ui-monospace, monospace; }
      /* Select del salvataggio (tema/difficoltà) */
      #modal select {
        font-family: inherit;
        font-size: 14px;
        padding: 6px 8px;
        border-radius: 8px;
        border: 2px solid var(--outline);
        background: #08061a;
        color: var(--text);
      }
      /* Lista "gestisci livelli salvati" nella modale */
      .saved-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
      .saved-row {
        display: flex; align-items: center; gap: 10px;
        padding: 6px 10px; border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        font-size: 13px;
      }
      .saved-row .nm { flex: 1; }
      .saved-row .meta { opacity: 0.6; font-size: 12px; }
      .saved-row .del {
        cursor: pointer; color: #ff7a6e; background: none; border: none;
        font-family: inherit; font-size: 13px;
      }
      .saved-row .edit {
        cursor: pointer; color: var(--yellow); background: none; border: none;
        font-family: inherit; font-size: 13px;
      }
      /* Banner "stai modificando": in alto al centro sopra il canvas */
      #editBanner {
        display: none; /* attivato via JS quando si modifica un livello */
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 6;
        align-items: center;
        gap: 12px;
        padding: 6px 12px;
        border-radius: 10px;
        border: 2px solid var(--yellow);
        background: rgba(20, 16, 46, 0.95);
        font-size: 14px;
        color: var(--text);
      }
      #editBanner b { color: var(--yellow); }
      /* --- Anteprima giocabile (overlay a tutto schermo) ---------------- */
      #previewOverlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #0c0a1f;
      }
      #previewOverlay.show { display: block; }
      #previewCanvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
      #previewExit {
        position: absolute;
        top: 14px;
        right: 16px;
        z-index: 31;
      }
      /* --- Anteprima vittoria (overlay a tutto schermo) ----------------- */
      #victoryOverlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #0c0a1f;
      }
      #victoryOverlay.show { display: block; }
      #victoryCanvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
      #victoryControls {
        position: absolute;
        top: 14px;
        right: 16px;
        z-index: 31;
        display: flex;
        gap: 8px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <span class="title">OG DASH — GAME BUILDER</span>
        <button class="btn ghost small" id="btnSelect">Seleziona</button>
        <div class="zoomctl">
          <button class="btn ghost small" id="btnZoomOut" title="Riduci (−)">−</button>
          <span id="zoomPct">100%</span>
          <button class="btn ghost small" id="btnZoomIn" title="Ingrandisci (+)">+</button>
        </div>
        <button class="btn ghost small" id="btnManage">Livelli di gioco</button>
        <button class="btn ghost small" id="btnLoad">Carica livello…</button>
        <button class="btn ghost small" id="btnTrim">Taglia vuoto</button>
        <button class="btn ghost small" id="btnClear">Svuota</button>
        <button class="btn" id="btnPreview">Anteprima</button>
        <button class="btn" id="btnVictoryPreview">Anteprima vittoria</button>
        <button class="btn green" id="btnPlay">Salva nel gioco</button>
        <button class="btn ghost" id="btnExport">Genera file</button>
      </div>

      <div id="palette">
        <h2>ELEMENTI</h2>
        <!-- popolato da builder.js -->
      </div>

      <div id="canvasWrap">
        <canvas id="builder"></canvas>
        <div id="hud"></div>
        <!-- Banner "stai modificando un livello esistente" (mostrato via JS) -->
        <div id="editBanner">
          <span class="eb-text">Modifica: <b id="editBannerName">—</b></span>
          <button class="btn small" id="editBannerNew">Nuovo livello</button>
        </div>
      </div>

      <div id="validate">
        <h2>VALIDAZIONE</h2>
        <div id="verdict">—</div>
        <div id="stats"></div>
        <div id="checks"></div>
        <div class="legend" id="legend"></div>
      </div>
    </div>

    <!-- Modal condivisa: export (textarea con il file) / import (incolla array) -->
    <div id="modal">
      <div id="modalBox">
        <h3 id="modalTitle">—</h3>
        <div class="row" id="modalNameRow">
          <label for="modalName">Nome livello:</label>
          <input type="text" id="modalName" value="mialevel" />
        </div>
        <!-- Solo per "Salva nel gioco": tema + difficoltà -->
        <div class="row" id="modalSaveRow" style="display: none;">
          <label for="modalTheme">Tema:</label>
          <select id="modalTheme"></select>
          <label for="modalDiff">Difficoltà:</label>
          <select id="modalDiff"></select>
        </div>
        <div id="modalHint"></div>
        <textarea id="modalText" spellcheck="false"></textarea>
        <!-- Solo per "Salva nel gioco": lista livelli salvati con elimina -->
        <div class="saved-list" id="modalSavedList" style="display: none;"></div>
        <div class="row" style="margin-top: 10px; justify-content: flex-end;">
          <button class="btn ghost" id="modalCancel">Chiudi</button>
          <button class="btn" id="modalAction">—</button>
        </div>
      </div>
    </div>

    <!-- Anteprima giocabile: overlay a tutto schermo con un'istanza del motore -->
    <div id="previewOverlay">
      <canvas id="previewCanvas"></canvas>
      <button class="btn" id="previewExit">Esci (ESC)</button>
    </div>

    <!-- Anteprima vittoria: riproduce l'animazione di fine livello (VictoryAnim) -->
    <div id="victoryOverlay">
      <canvas id="victoryCanvas"></canvas>
      <div id="victoryControls">
        <button class="btn small active" id="btnVicArtie">Artie</button>
        <button class="btn small" id="btnVicMiles">Miles</button>
        <button class="btn" id="btnVicReplay">Ripeti</button>
        <button class="btn" id="victoryExit">Esci (ESC)</button>
      </div>
    </div>

    <script type="module" src="/src/builder/builder.js"></script>
  </body>
</html>
