<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GeoRush</title>
    <!-- PWA: installabile + a tutto schermo se lanciata dall'icona Home -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#1a1a2e" />
    <!-- iOS Safari: web-app a tutto schermo (zero barre) quando aperta da Home.
         Safari NON ha la Fullscreen API in-scheda: l'unico vero fullscreen su
         iPhone e' "Aggiungi a Home" (vedi banner #installHint). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OG DASH" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" href="./apple-touch-icon.png" />
    <!-- Font display della UI (locale) -->
    <style>
      @font-face {
        font-family: 'SoccerLeague';
        src: url('/SoccerLeague.ttf') format('truetype');
        font-display: swap;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      /* Il canvas riempie tutta la finestra; touch-action: none evita lo scroll su mobile */
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      /* Overlay "ruota il telefono": mostrato (via JS) solo su dispositivi touch in
         verticale. Sta sopra il canvas E sopra l'<input> nickname (z-index 10).
         Palette/font coerenti con la UI del gioco (SoccerLeague + colori di config). */
      #rotate {
        display: none; /* attivato in JS -> 'flex' quando portrait su touch */
        position: fixed;
        inset: 0;
        z-index: 10;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        padding: 24px;
        box-sizing: border-box;
        background: radial-gradient(circle at 50% 38%, #241a4d 0%, #14102e 70%, #0c0a1f 100%);
        color: #ffffff;
        font-family: 'SoccerLeague', system-ui, sans-serif;
        text-align: center;
        user-select: none;
        -webkit-user-select: none;
      }
      /* Glifo telefono: rettangolo arrotondato bianco con leggero glow, ruota. */
      #rotate .rotate-phone {
        width: 76px;
        height: 132px;
        border: 6px solid #ffffff;
        border-radius: 16px;
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.45);
        position: relative;
        animation: rotateHint 1.9s ease-in-out infinite;
      }
      /* Capsula altoparlante in alto. */
      #rotate .rotate-phone::before {
        content: '';
        position: absolute;
        top: 9px;
        left: 50%;
        transform: translateX(-50%);
        width: 26px;
        height: 5px;
        border-radius: 3px;
        background: #ffffff;
      }
      /* Tasto home in basso. */
      #rotate .rotate-phone::after {
        content: '';
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 3px solid #ffffff;
      }
      #rotate .rotate-title {
        font-size: clamp(28px, 8vw, 48px);
        letter-spacing: 1px;
        color: #ffd23f;
        text-shadow: 0 3px 0 #0a0a12;
      }
      #rotate .rotate-sub {
        font-size: clamp(16px, 4.5vw, 24px);
        color: #ffffff;
        text-shadow: 0 2px 0 #0a0a12;
      }
      @keyframes rotateHint {
        0%, 38% {
          transform: rotate(0deg);
        }
        62%, 100% {
          transform: rotate(-90deg);
        }
      }
      /* Accessibilità: niente animazione se l'utente preferisce ridurre il movimento. */
      @media (prefers-reduced-motion: reduce) {
        #rotate .rotate-phone {
          animation: none;
          transform: rotate(-90deg);
        }
      }

      /* Banner "Aggiungi a Home": invito (solo iPhone in Safari, non standalone)
         a installare per il vero fullscreen. Mostrato/nascosto via JS. z-index 9
         (sotto #rotate=10: in portrait comanda l'overlay rotazione). */
      #installHint {
        display: none; /* attivato in JS -> 'flex' su iOS Safari non-standalone */
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        z-index: 9;
        max-width: min(92vw, 560px);
        box-sizing: border-box;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 2px solid #ffd23f;
        background: rgba(20, 16, 46, 0.96);
        color: #ffffff;
        font-family: 'SoccerLeague', system-ui, sans-serif;
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.5);
      }
      #installHint .ih-text {
        flex: 1;
        font-size: clamp(13px, 3.6vw, 17px);
        line-height: 1.25;
      }
      #installHint .ih-text b {
        color: #ffd23f;
      }
      /* Glifo "Condividi" iOS (quadrato aperto in alto + freccia su) in CSS, no asset. */
      #installHint .ih-share {
        flex: 0 0 auto;
        position: relative;
        width: 26px;
        height: 30px;
      }
      #installHint .ih-share::before {
        content: '';
        position: absolute;
        left: 2px;
        bottom: 0;
        width: 22px;
        height: 18px;
        border: 2px solid #ffd23f;
        border-top: none;
        border-radius: 3px;
        box-sizing: border-box;
      }
      /* Asta verticale della freccia (sale dentro il box). */
      #installHint .ih-share::after {
        content: '';
        position: absolute;
        left: 12px;
        top: 4px;
        width: 2px;
        height: 15px;
        background: #ffd23f;
      }
      /* Punta della freccia (chevron) in cima all'asta. */
      #installHint .ih-share i {
        position: absolute;
        left: 9px;
        top: 3px;
        width: 8px;
        height: 8px;
        border-left: 2px solid #ffd23f;
        border-top: 2px solid #ffd23f;
        transform: rotate(45deg);
      }
      #installHint .ih-close {
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
        font-family: inherit;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <!-- Overlay "ruota il telefono" (mostrato via JS in verticale su touch). -->
    <div id="rotate" aria-hidden="true">
      <div class="rotate-phone"></div>
      <div class="rotate-title">RUOTA IL TELEFONO</div>
      <div class="rotate-sub">Gioca in orizzontale</div>
    </div>
    <!-- Banner "Aggiungi a Home" (mostrato via JS solo su iPhone in Safari). -->
    <div id="installHint" role="dialog" aria-label="Aggiungi a Home">
      <span class="ih-share" aria-hidden="true"><i></i></span>
      <span class="ih-text">Per il <b>fullscreen</b>: tocca <b>Condividi</b> e poi <b>"Aggiungi a Home"</b></span>
      <button id="installHintClose" class="ih-close" type="button" aria-label="Chiudi">✕</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
